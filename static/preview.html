<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Talk to BOT / preview</title>
  <style>
    body {
      font-family: 'Times New Roman', Times, serif;
      max-width: 560px;
      margin: 40px auto;
      padding: 0 20px 280px;
    }

    #preview-header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 40px;
      border-bottom: 1px solid #eee;
      padding-bottom: 12px;
    }

    #preview-header span {
      font-size: 12px;
      color: #aaa;
      letter-spacing: 0.05em;
    }

    #reset-btn {
      font-family: inherit;
      font-size: 12px;
      color: #aaa;
      background: none;
      border: none;
      cursor: pointer;
      padding: 0;
      letter-spacing: 0.03em;
    }

    #reset-btn:hover { color: #333; }

    #messages {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .msg { max-width: 78%; }
    .msg.bot { align-self: flex-start; }
    .msg.user { align-self: flex-end; text-align: right; color: #666; }
    .msg .ts { font-size: 11px; color: #aaa; }

    .msg .body { line-height: 1.6; white-space: pre-wrap; }

    .tomorrow-divider {
      font-size: 11px;
      color: #ccc;
      letter-spacing: 0.08em;
      text-align: center;
      margin: 4px 0;
    }

    #input-bar {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      padding: 16px 20px;
      pointer-events: none;
    }

    #typing {
      display: none;
      max-width: 560px;
      margin: 0 auto 8px;
      padding: 0 14px;
      color: #aaa;
      font-style: italic;
      font-size: 0.9em;
      text-align: center;
    }

    #input-inner {
      max-width: 560px;
      margin: 0 auto;
      background: white;
      padding: 12px 14px;
      pointer-events: all;
    }

    #reply {
      display: block;
      width: 100%;
      font-family: inherit;
      font-size: 1em;
      line-height: 1.6;
      resize: vertical;
      border: 1px solid #999;
      padding: 24px;
      min-height: 180px;
      outline: none;
      box-sizing: border-box;
      overflow: auto;
    }

    #input-footer {
      display: flex;
      justify-content: flex-end;
      align-items: center;
      margin-top: 10px;
    }

    #send-btn {
      font-family: inherit;
      font-size: 1em;
      padding: 6px 18px;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
    }

    #send-btn:hover { background: black; color: white; }
    #send-btn:disabled { opacity: 0.4; cursor: default; }

    #decline-btn {
      font-family: inherit;
      font-size: 0.8em;
      color: #999;
      background: #f0f0f0;
      border: none;
      padding: 3px 10px;
      cursor: pointer;
      border-radius: 12px;
      letter-spacing: 0.01em;
      transition: color 0.15s, background 0.15s;
    }

    #decline-btn:hover {
      color: #555;
      background: #e4e4e4;
    }
  </style>
</head>
<body>

<div id="preview-header">
  <span>preview</span>
  <button id="reset-btn">reset</button>
</div>

<div id="messages"></div>

<div id="input-bar">
  <div id="typing">processing...</div>
  <div id="input-inner">
    <div style="margin-bottom: 10px;">
      <button id="decline-btn">decline to answer</button>
    </div>
    <textarea id="reply" autocomplete="off" spellcheck="false" placeholder="say as much as you want"></textarea>
    <div id="input-footer">
      <button id="send-btn">send</button>
    </div>
  </div>
</div>

<script>
  const OPENING_QUESTIONS = [
    "Hello.\n\nDescribe what you're looking at right now?",
    "Hello.\n\nDescribe the nearest unfinished thing to you right now?",
    "Hello.\n\nDescribe the last conversation you had before opening this?",
    "Hello.\n\nDescribe what you can hear from where you're sitting?",
  ];

  let history = [];
  let busy = false;

  function ts(raw) {
    if (!raw) return '';
    const d = new Date(raw);
    return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' })
      + '\u2002'
      + d.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });
  }

  function dateLabel(raw) {
    const d = new Date(raw);
    return d.toLocaleDateString('en-US', { month: 'long', day: 'numeric' });
  }

  function makeMessageEl(role, content, timestamp) {
    const div = document.createElement('div');
    div.className = `msg ${role}`;

    const body = document.createElement('div');
    body.className = 'body';
    const label = document.createElement('strong');
    label.textContent = role === 'bot' ? 'Bot: ' : 'User: ';
    body.appendChild(label);
    body.appendChild(document.createTextNode(content));
    div.appendChild(body);

    const t = document.createElement('div');
    t.className = 'ts';
    t.textContent = ts(timestamp);
    div.appendChild(t);

    return div;
  }

  function makeDivider(text) {
    const d = document.createElement('div');
    d.className = 'tomorrow-divider';
    d.textContent = text;
    return d;
  }

  function appendMessage(role, content, timestamp) {
    const box = document.getElementById('messages');
    const now = timestamp || new Date().toISOString();

    const d = dateLabel(now);
    const lastDivider = box.querySelector('.tomorrow-divider[data-date]');
    const lastDate = box.lastChild && box.lastChild.dataset && box.lastChild.dataset.date;
    // Insert date divider if day changed
    const allDateDividers = box.querySelectorAll('[data-date]');
    const lastDateEl = allDateDividers[allDateDividers.length - 1];
    if (!lastDateEl || lastDateEl.dataset.date !== d) {
      const dd = makeDivider(d);
      dd.dataset.date = d;
      box.appendChild(dd);
    }

    box.appendChild(makeMessageEl(role, content, now));
    window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
  }

  function appendAckDivider() {
    const box = document.getElementById('messages');
    box.appendChild(makeDivider('BOT will be back tomorrow'));
    window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
  }

  function init() {
    history = [];
    document.getElementById('messages').innerHTML = '';
    document.getElementById('reply').value = '';

    const opening = OPENING_QUESTIONS[Math.floor(Math.random() * OPENING_QUESTIONS.length)];
    const now = new Date().toISOString();
    history.push({ role: 'bot', content: opening });
    appendMessage('bot', opening, now);
  }

  async function send() {
    if (busy) return;
    const textarea = document.getElementById('reply');
    const text = textarea.value.trim();
    if (!text) return;

    busy = true;
    document.getElementById('send-btn').disabled = true;
    textarea.value = '';

    const now = new Date().toISOString();
    history.push({ role: 'user', content: text });
    appendMessage('user', text, now);

    document.getElementById('typing').style.display = 'block';
    window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });

    try {
      const r = await fetch('/api/preview', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ history })
      });

      if (!r.ok) throw new Error('request failed');
      const data = await r.json();

      document.getElementById('typing').style.display = 'none';

      const ackTime = new Date().toISOString();
      history.push({ role: 'bot', content: data.ack });
      appendMessage('bot', data.ack, ackTime);
      appendAckDivider();

      setTimeout(() => {
        history.push({ role: 'bot', content: data.response });
        appendMessage('bot', data.response, new Date().toISOString());
      }, 700);

    } catch (e) {
      document.getElementById('typing').style.display = 'none';
      appendMessage('bot', '[error — check server]');
    }

    busy = false;
    document.getElementById('send-btn').disabled = false;
    textarea.focus();
  }

  document.getElementById('send-btn').addEventListener('click', send);
  document.getElementById('reset-btn').addEventListener('click', init);

  document.getElementById('decline-btn').addEventListener('click', function () {
    const textarea = document.getElementById('reply');
    textarea.value = "I'd rather not answer that.";
    textarea.focus();
  });

  document.getElementById('reply').addEventListener('keydown', function(e) {
    if (e.key === 'Enter' && (e.metaKey || e.ctrlKey)) {
      e.preventDefault();
      send();
    }
  });

  init();
</script>
</body>
</html>
